<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cartas del Tío Rico</title>

  <!-- FUENTE TYPEWRITER -->
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

  <!-- ICONOS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Special Elite', monospace;
      background: url('fondo.png') no-repeat center center/cover;
      color: rgb(0, 0, 0);
      text-align: center;
    }

    .overlay {
      /* QUITAMOS EL FONDO OSCURO */
      min-height: 100vh;
      padding: 60px 20px;
    }

    .logo {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 20px;
      box-shadow: 0 0 15px rgba(255,255,255,0.3);
    }

    h1 {
      font-size: 34px;
      margin: 10px 0;
      letter-spacing: 2px;
    }

    .bio {
      font-size: 16px;
      opacity: 0.85;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    .social-icons {
      margin-bottom: 30px;
    }

    .social-icons a {
      margin: 0 15px;
      font-size: 26px;
      color: rgb(0, 0, 0);
      transition: 0.3s;
    }

    .social-icons a:hover {
      color: #6d6d6d;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 30px;
      background: #6d6d6d;
      color: black;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
      letter-spacing: 1px;
      transition: 0.3s;
    }

    .btn:hover {
      background: rgb(122, 57, 57);
    }

  </style>
</head>

<body>

  <div class="overlay">

    <!-- LOGO -->
    <img class="logo" src="logo.jpg" alt="Logo">

    <!-- NOMBRE -->
    <h1>Cartas del Tío Rico</h1>

    <!-- DESCRIPCIÓN -->
    <p class="bio">
      Para los que quieren mas dinero,<br>
      no más excusas.<br>
      - El Tío Rico💰
    </p>

    <!-- REDES -->
    <div class="social-icons">
      <a href="https://www.instagram.com/cartasdeltiorico" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://www.tiktok.com/@cartasdeltiorico" target="_blank"><i class="fab fa-tiktok"></i></a>
      <a href="https://www.facebook.com/cartasdeltiorico" target="_blank"><i class="fab fa-facebook"></i></a>
      <a href="https://www.youtube.com/@cartasdeltiorico" target="_blank"><i class="fab fa-youtube"></i></a>
    </div>

    <!-- TEXTO EXTRA -->
    <p class="bio">
      ¿Quieres ser VIP?<br>
      <!-- BOTÓN -->
    <a href="https://www.instagram.com/cartasdeltiorico" class="btn" target="_blank">
      Entrar al círculo privado
    </a>

  </div>

</body>
</html>
